<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 220px;
            padding: 16px;
            font-family: 'Segoe UI', sans-serif;
            background-color: #323532;
            color: #d4d0c0;
            margin: 0;
        }

        h2 {
            margin: 0 0 14px 0;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #e8e4d0;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .label {
            font-size: 13px;
        }

        /* Toggle switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 42px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #5A5D56;
            border-radius: 24px;
            transition: 0.2s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #8F8A76;
            border-radius: 50%;
            transition: 0.2s;
        }

        input:checked + .slider {
            background-color: #BB3524;
        }

        input:checked + .slider:before {
            transform: translateX(18px);
            background-color: #e8e4d0;
        }
    </style>
</head>
<body>
    <h2>G-Docs Dark Mode</h2>
    <div class="row">
        <span class="label">Enable dark colors</span>
        <label class="switch">
            <input type="checkbox" id="driveToggle">
            <span class="slider"></span>
        </label>
    </div>
    <script src="popup.js"></script>
</body>
</html>
